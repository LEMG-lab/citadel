language = "C"
header = """/* Generated by cbindgen — do not edit */

/*
 * Thread safety
 * -------------
 * Vault handles (void* returned by vault_open / vault_create) are NOT
 * thread-safe.  All calls on the same handle must be serialized by the
 * caller.  Passing the same handle to multiple threads concurrently is
 * undefined behaviour.
 *
 * Atomic saves
 * ------------
 * vault_save_to() truncates and overwrites the file directly.  It is
 * intentionally non-atomic — the caller MUST write to a temporary file
 * then rename over the target path to guarantee crash safety.
 */"""
include_guard = "CITADEL_CORE_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Don't modify this manually. */"
tab_width = 4
style = "both"

[export]
include = [
    "VaultResult",
    "CEntryListItem",
    "CEntryList",
    "CEntryData",
    "CharsetFlags",
]

[enum]
rename_variants = "QualifiedScreamingSnakeCase"
